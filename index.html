<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>五惠外倉 存貨設備管理系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
        [v-cloak] { display: none; }
        .zoom-img { transform: scale(1.3); transition: transform 0.3s ease; }
        .glass-bg {
            position: absolute;
            inset: 0;
            background-size: cover;
            background-position: center;
            filter: blur(15px) brightness(0.9);
            opacity: 0.4;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 antialiased font-sans">

<div id="app" v-cloak class="min-h-screen flex flex-col">
    
    <!-- Header -->
    <header class="bg-red-800 text-white shadow-xl sticky top-0 z-50 px-4 py-3">
        <div class="container mx-auto flex justify-between items-center">
            <div @click="viewMode = 'list'" class="cursor-pointer">
                <h1 class="text-xl md:text-2xl font-black tracking-widest">五惠外倉系統</h1>
                <p class="text-[10px] opacity-70 font-bold uppercase tracking-tighter">Inventory v8.0</p>
            </div>
            <button @click="openAddModal" class="bg-yellow-400 hover:bg-yellow-500 text-red-950 px-5 py-2 rounded-xl font-black text-sm shadow-lg active:scale-90 transition tracking-widest">
                + 新增物品
            </button>
        </div>
    </header>

    <!-- Nav -->
    <nav class="bg-white border-b sticky top-[68px] z-40 shadow-sm flex">
        <button @click="viewMode = 'list'" :class="viewMode === 'list' ? 'border-b-4 border-red-600 text-red-700' : 'text-gray-400'" class="flex-1 py-3 font-black text-base transition">清單瀏覽</button>
        <button @click="viewMode = 'chart'" :class="viewMode === 'chart' ? 'border-b-4 border-red-600 text-red-700' : 'text-gray-400'" class="flex-1 py-3 font-black text-base transition">統計分析</button>
    </nav>

    <main class="container mx-auto px-4 py-6">
        
        <!-- 搜尋與分類 -->
        <div v-if="viewMode === 'list'" class="space-y-3 mb-6">
            <div class="flex p-1 bg-gray-200 rounded-2xl w-full md:w-fit shadow-inner">
                <button v-for="t in ['全部','設備','物料']" @click="currentTab = t" 
                    :class="currentTab === t ? 'bg-white shadow text-red-800' : 'text-slate-500'"
                    class="flex-1 md:px-8 py-2 rounded-xl font-black transition text-xs">{{ t }}</button>
            </div>
            <input v-model="searchQuery" type="text" placeholder="🔍 快速搜尋物品..." 
                class="w-full px-5 py-3 bg-white border-2 border-slate-100 rounded-2xl shadow-sm focus:border-red-500 outline-none font-bold transition text-base">
        </div>

        <!-- 清單 -->
        <div v-if="viewMode === 'list'" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
            <div v-if="loading" class="col-span-full text-center py-20 text-gray-300 font-black text-xl animate-pulse italic uppercase tracking-widest">同步中...</div>
            
            <div v-for="(item, index) in filteredItems" :key="index" class="bg-white rounded-[2rem] shadow-sm border border-slate-100 overflow-hidden flex flex-col relative transition hover:shadow-xl">
                
                <!-- 照片區域：置中 + 1.3倍 -->
                <div class="h-64 bg-slate-100 relative overflow-hidden flex items-center justify-center border-b">
                    <div class="glass-bg" :style="{ backgroundImage: item.photoID ? `url(https://drive.google.com/thumbnail?id=${item.photoID}&sz=w100)` : '' }"></div>
                    <img @click="previewImage(item)" 
                         :src="item.photoID ? 'https://drive.google.com/thumbnail?id=' + item.photoID + '&sz=w800' : 'https://placehold.co/600x400?text=NO+IMAGE'" 
                         class="max-w-full max-h-full object-contain relative z-10 zoom-img cursor-zoom-in">
                    
                    <span class="absolute top-3 left-3 bg-red-700 text-white px-4 py-1.5 rounded-xl text-[10px] font-black shadow-lg z-20 uppercase">
                        {{ item.category }}
                    </span>

                    <div class="absolute top-3 right-3 flex flex-col space-y-1.5 z-20">
                        <button @click="openEditModal(item)" class="bg-blue-600/90 text-white w-10 h-10 rounded-xl flex items-center justify-center shadow-lg font-bold text-xs active:scale-90 transition">修改</button>
                        <button @click="deleteItem(item)" class="bg-red-600/90 text-white w-10 h-10 rounded-xl flex items-center justify-center shadow-lg font-bold text-xs active:scale-90 transition">刪除</button>
                    </div>
                </div>

                <!-- 資訊區域：極簡化薄型設計 -->
                <div class="px-5 py-3 flex justify-between items-center bg-white min-h-[60px]">
                    <h3 class="text-xl font-black text-slate-800 tracking-tight truncate pr-2">{{ item.name }}</h3>
                    <div class="text-right flex-shrink-0">
                        <p class="text-3xl font-black text-red-700 leading-none">{{ item.qty }}<span class="text-[9px] font-bold text-slate-300 ml-0.5">{{ item.category === '設備' ? '台' : '板' }}</span></p>
                    </div>
                </div>
            </div>
        </div>

        <!-- 統計分析 -->
        <div v-if="viewMode === 'chart'" class="max-w-3xl mx-auto space-y-6">
            <div class="grid grid-cols-2 gap-4">
                <div class="bg-white p-6 rounded-[2.5rem] shadow-sm text-center border-b-4 border-blue-500">
                    <p class="text-[10px] font-black text-slate-300 mb-1 tracking-widest uppercase tracking-widest">設備總計</p>
                    <p class="text-5xl font-black text-blue-600 tracking-tighter">{{ stats.equipmentTotal }}<span class="text-base font-bold text-slate-300 ml-1 uppercase">台</span></p>
                </div>
                <div class="bg-white p-6 rounded-[2.5rem] shadow-sm text-center border-b-4 border-green-500">
                    <p class="text-[10px] font-black text-slate-300 mb-1 tracking-widest uppercase tracking-widest">物料總計</p>
                    <p class="text-5xl font-black text-green-600 tracking-tighter">{{ stats.materialTotal }}<span class="text-base font-bold text-slate-300 ml-1 uppercase">板</span></p>
                </div>
            </div>
            
            <div class="bg-white p-8 rounded-[2.5rem] shadow-sm">
                <h3 class="text-xs font-black text-slate-800 mb-6 flex items-center tracking-widest uppercase"><span class="w-1.5 h-4 bg-red-700 rounded-sm mr-2"></span>物料各項清單</h3>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-x-10 gap-y-2">
                    <div v-for="i in items.filter(x=>x.category==='物料')" class="flex justify-between items-center py-2 border-b border-slate-50">
                        <span class="font-bold text-slate-600">{{ i.name }}</span>
                        <span class="font-black text-red-600 bg-red-50 px-2 py-0.5 rounded-lg text-sm">{{ i.qty }} 板</span>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- 圖片預覽 -->
    <div v-if="zoomedImage" @click="zoomedImage = null" class="fixed inset-0 bg-black/95 z-[200] flex items-center justify-center p-4 cursor-zoom-out shadow-inner">
        <img :src="zoomedImage" class="max-w-full max-h-full object-contain rounded-lg shadow-2xl animate-fadeIn">
        <div class="absolute top-6 right-6 text-white text-3xl font-light">&times;</div>
    </div>

    <!-- 彈窗 -->
    <div v-if="showModal" class="fixed inset-0 bg-slate-900/90 backdrop-blur-md flex items-center justify-center p-4 z-[100]">
        <div class="bg-white rounded-[2.5rem] w-full max-w-md p-8 shadow-2xl relative overflow-y-auto max-h-[90vh]">
            <div v-if="uploading" class="absolute inset-0 bg-white/95 z-10 flex flex-col items-center justify-center rounded-[2.5rem]">
                <div class="w-10 h-10 border-4 border-red-700 border-t-transparent rounded-full animate-spin mb-4"></div>
                <p class="font-black text-red-800 text-xs tracking-widest uppercase font-bold animate-pulse">數據同步中...</p>
            </div>
            
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-black text-slate-800 tracking-tight">{{ isEditing ? '修改項目' : '新增入庫' }}</h2>
                <button @click="showModal = false" class="text-slate-300 text-3xl font-light">&times;</button>
            </div>

            <div class="space-y-5">
                <div>
                    <label class="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-1.5 block ml-1">類別</label>
                    <div class="grid grid-cols-2 gap-2">
                        <button @click="modalItem.category = '設備'" :class="modalItem.category === '設備' ? 'bg-red-800 text-white shadow-lg' : 'bg-slate-100 text-slate-400'" class="py-3.5 rounded-xl font-black transition text-sm">設備</button>
                        <button @click="modalItem.category = '物料'" :class="modalItem.category === '物料' ? 'bg-red-800 text-white shadow-lg' : 'bg-slate-100 text-slate-400'" class="py-3.5 rounded-xl font-black transition text-sm">物料</button>
                    </div>
                </div>
                <div>
                    <label class="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-1.5 block ml-1">品名</label>
                    <input v-model="modalItem.name" type="text" class="w-full bg-slate-50 border-2 border-slate-100 rounded-2xl px-5 py-3.5 font-black text-lg text-slate-700 outline-none focus:border-red-700 transition">
                </div>
                <div>
                    <label class="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-1.5 block ml-1">數量調整</label>
                    <div class="flex items-center space-x-3 bg-slate-100 rounded-2xl p-1.5 shadow-inner">
                        <button @click="modalItem.qty > 1 ? modalItem.qty-- : null" class="w-12 h-12 bg-white rounded-xl text-2xl font-bold text-slate-300 active:scale-90 transition shadow-sm border border-slate-100">-</button>
                        <input v-model.number="modalItem.qty" type="number" class="flex-grow bg-transparent text-center font-black text-3xl outline-none text-red-700">
                        <button @click="modalItem.qty++" class="w-12 h-12 bg-white rounded-xl text-2xl font-bold text-red-700 active:scale-90 transition shadow-sm border border-slate-100">+</button>
                    </div>
                </div>
                <div>
                    <label class="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-1.5 block ml-1">更新照片</label>
                    <div class="flex flex-col items-center justify-center border-2 border-dashed border-slate-200 rounded-[2rem] p-6 bg-slate-50 relative cursor-pointer overflow-hidden shadow-inner hover:bg-slate-100 transition">
                        <input type="file" @change="handleFileUpload" accept="image/*" class="absolute inset-0 opacity-0 cursor-pointer">
                        <img v-if="modalItem.image || modalItem.photoID" :src="modalItem.image || 'https://drive.google.com/thumbnail?id=' + modalItem.photoID + '&sz=w400'" class="h-32 w-full object-contain rounded-xl">
                        <p v-else class="text-slate-300 font-bold tracking-widest text-[10px] uppercase">📷 拍照或選取新圖檔</p>
                    </div>
                </div>
                <button @click="submitForm" class="w-full bg-red-800 text-white py-5 rounded-[2rem] font-black text-lg shadow-xl active:bg-red-900 transition tracking-widest">同步數據</button>
            </div>
        </div>
    </div>
</div>

<script>
// --- 請保持此 API 網址 ---
const API_URL = 'https://script.google.com/macros/s/AKfycbwivxljVfMXIxbugME9GmAIn4ig90jNFGCSCIhm8G8tg8pkmAw_TCxClYDUvZrXGLx4dg/exec';

const { createApp, ref, computed, onMounted } = Vue;
createApp({
    setup() {
        const loading = ref(true);
        const uploading = ref(false);
        const showModal = ref(false);
        const isEditing = ref(false);
        const viewMode = ref('list');
        const currentTab = ref('全部');
        const searchQuery = ref('');
        const items = ref([]);
        const zoomedImage = ref(null);
        const modalItem = ref({ category: '設備', name: '', qty: 1, image: null, oldName: '' });

        const fetchData = async () => {
            loading.value = true;
            try {
                const res = await fetch(`${API_URL}?t=${new Date().getTime()}`);
                items.value = await res.json();
            } catch (e) { console.error(e); }
            loading.value = false;
        };

        const openAddModal = () => {
            isEditing.value = false;
            modalItem.value = { category: '設備', name: '', qty: 1, image: null };
            showModal.value = true;
        };

        const openEditModal = (item) => {
            isEditing.value = true;
            modalItem.value = { ...item, oldName: item.name, image: null };
            showModal.value = true;
        };

        const previewImage = (item) => {
            if (item.photoID) zoomedImage.value = 'https://drive.google.com/thumbnail?id=' + item.photoID + '&sz=w1600';
        };

        const deleteItem = async (item) => {
            if (!confirm(`確定要刪除「${item.name}」嗎？`)) return;
            uploading.value = true;
            try {
                await fetch(API_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify({ action: 'delete', name: item.name })
                });
                setTimeout(fetchData, 1500);
            } catch (e) { alert('失敗'); }
            uploading.value = false;
        };

        const submitForm = async () => {
            if (!modalItem.value.name) return alert('請輸入品名');
            uploading.value = true;
            try {
                const payload = { ...modalItem.value, action: isEditing.value ? 'update' : 'add' };
                await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
                setTimeout(() => { fetchData(); showModal.value = false; uploading.value = false; }, 2000);
            } catch (e) { alert('同步失敗'); uploading.value = false; }
        };

        const filteredItems = computed(() => {
            return items.value.filter(i => {
                const matchTab = currentTab.value === '全部' || i.category === currentTab.value;
                const matchSearch = String(i.name).toLowerCase().includes(searchQuery.value.toLowerCase());
                return matchTab && matchSearch;
            }).reverse();
        });

        const stats = computed(() => {
            const eq = items.value.filter(i => i.category === '設備');
            const mat = items.value.filter(i => i.category === '物料');
            return {
                equipmentTotal: eq.reduce((s, i) => s + (Number(i.qty) || 0), 0),
                materialTotal: mat.reduce((s, i) => s + (Number(i.qty) || 0), 0)
            }
        });

        const handleFileUpload = (e) => {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = (f) => modalItem.value.image = f.target.result;
            reader.readAsDataURL(file);
        };

        onMounted(fetchData);
        return { loading, uploading, showModal, isEditing, viewMode, currentTab, searchQuery, filteredItems, stats, modalItem, zoomedImage, openAddModal, openEditModal, previewImage, submitForm, deleteItem, handleFileUpload };
    }
}).mount('#app');
</script>
</body>
</html>
