<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>五惠外倉 存貨設備管理系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
        [v-cloak] { display: none; }
        .card-shadow { box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05); }
    </style>
</head>
<body class="bg-slate-100 text-slate-800">

<div id="app" v-cloak class="min-h-screen">
    <!-- TOP表頭 -->
    <header class="bg-red-800 text-white shadow-xl sticky top-0 z-50">
        <div class="container mx-auto px-4 py-4 flex justify-between items-center">
            <div>
                <h1 class="text-xl md:text-2xl font-black tracking-widest text-white">五惠外倉</h1>
                <p class="text-xs opacity-80 font-bold">存貨設備管理系統</p>
            </div>
            <div class="flex space-x-2">
                <button @click="showAddModal = true" class="bg-yellow-500 hover:bg-yellow-600 text-red-900 px-4 py-2 rounded-xl font-black text-sm shadow-lg transition-transform active:scale-95">
                    + 新增物品
                </button>
                <button @click="fetchData" class="bg-white/20 hover:bg-white/30 px-3 py-2 rounded-xl text-white transition">
                    🔄 刷新
                </button>
            </div>
        </div>
    </header>

    <main class="container mx-auto px-4 py-6">
        <!-- 分類與搜尋 -->
        <div class="flex flex-col md:flex-row gap-4 mb-8">
            <div class="flex p-1 bg-gray-200 rounded-2xl w-full md:w-fit">
                <button v-for="tab in ['全部', '設備', '物料']" @click="currentTab = tab" 
                    :class="currentTab === tab ? 'bg-white shadow text-red-800' : 'text-gray-500'"
                    class="flex-1 md:flex-none px-8 py-2 rounded-xl font-black transition duration-200">
                    {{ tab }}
                </button>
            </div>
            <input v-model="searchQuery" type="text" placeholder="🔍 搜尋名稱..." 
                class="flex-grow px-5 py-3 border-none rounded-2xl shadow-inner bg-gray-200 focus:ring-2 focus:ring-red-500 outline-none transition font-bold">
        </div>

        <!-- 讀取狀態 -->
        <div v-if="loading" class="flex flex-col items-center justify-center py-20 text-gray-400 font-bold">
            <div class="w-10 h-10 border-4 border-red-600 border-t-transparent rounded-full animate-spin mb-4"></div>
            正在同步雲端資料...
        </div>

        <!-- 照片網格 -->
        <div v-else class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
            <div v-for="(item, index) in filteredItems" :key="index" class="bg-white rounded-3xl card-shadow overflow-hidden group">
                <div class="h-64 bg-slate-200 relative">
                    <img :src="item.photoID ? `https://lh3.googleusercontent.com/d/${item.photoID}` : 'https://placehold.co/600x400?text=無照片'" 
                         class="w-full h-full object-cover">
                    <div class="absolute top-4 left-4 bg-red-800 text-white px-3 py-1 rounded-full text-xs font-black">{{ item.category }}</div>
                </div>
                <div class="p-6 flex justify-between items-center">
                    <h3 class="text-xl font-bold text-slate-800">{{ item.name }}</h3>
                    <div class="text-right">
                        <span class="text-3xl font-black text-red-600">{{ item.qty }}</span>
                        <span class="ml-1 text-gray-400 font-bold text-sm">{{ item.category === '設備' ? '台' : '板' }}</span>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- 新增彈窗 -->
    <div v-if="showAddModal" class="fixed inset-0 bg-slate-900/90 backdrop-blur-md flex items-center justify-center p-4 z-[100]">
        <div class="bg-white rounded-[2rem] w-full max-w-md p-8 shadow-2xl relative">
            <div v-if="uploading" class="absolute inset-0 bg-white/95 z-10 flex flex-col items-center justify-center rounded-[2rem]">
                <div class="w-12 h-12 border-4 border-red-600 border-t-transparent rounded-full animate-spin mb-4"></div>
                <p class="font-black text-red-800 text-xl animate-pulse">上傳雲端中...</p>
            </div>

            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-black text-slate-800 border-l-8 border-red-600 pl-3">新增存放物品</h2>
                <button @click="showAddModal = false" class="text-gray-400 text-2xl">×</button>
            </div>

            <div class="space-y-6">
                <div class="grid grid-cols-2 gap-3">
                    <button @click="newItem.category = '設備'" :class="newItem.category === '設備' ? 'bg-red-800 text-white' : 'bg-gray-100 text-gray-400'" class="py-3 rounded-xl font-bold transition">設備 (台)</button>
                    <button @click="newItem.category = '物料'" :class="newItem.category === '物料' ? 'bg-red-800 text-white' : 'bg-gray-100 text-gray-400'" class="py-3 rounded-xl font-bold transition">物料 (板)</button>
                </div>
                <input v-model="newItem.name" type="text" placeholder="物品名稱" class="w-full bg-gray-100 rounded-xl px-5 py-4 outline-none font-bold">
                <input v-model.number="newItem.qty" type="number" placeholder="數量" class="w-full bg-gray-100 rounded-xl px-5 py-4 outline-none font-bold">
                <div class="flex flex-col items-center justify-center border-2 border-dashed border-gray-300 rounded-2xl p-4 bg-gray-50 relative">
                    <input type="file" @change="handleFileUpload" accept="image/*" class="absolute inset-0 opacity-0 cursor-pointer">
                    <img v-if="newItem.image" :src="newItem.image" class="h-32 w-full object-cover rounded-xl">
                    <p v-else class="text-gray-400 font-bold">📷 點擊拍照或選圖</p>
                </div>
                <button @click="submitItem" class="w-full bg-red-800 text-white py-5 rounded-2xl font-black text-lg shadow-xl shadow-red-200">確認存檔</button>
            </div>
        </div>
    </div>
</div>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbwivxljVfMXIxbugME9GmAIn4ig90jNFGCSCIhm8G8tg8pkmAw_TCxClYDUvZrXGLx4dg/exec';

const { createApp, ref, computed, onMounted } = Vue;
createApp({
    setup() {
        const loading = ref(true);
        const uploading = ref(false);
        const showAddModal = ref(false);
        const currentTab = ref('全部');
        const searchQuery = ref('');
        const items = ref([]);
        const newItem = ref({ category: '設備', name: '', qty: 1, image: null });

        const fetchData = async () => {
            loading.value = true;
            try {
                // 加一個隨機參數防止快取
                const res = await fetch(`${API_URL}?t=${new Date().getTime()}`);
                const data = await res.json();
                items.value = Array.isArray(data) ? data : [];
            } catch (e) { console.error('讀取失敗', e); }
            loading.value = false;
        };

        const handleFileUpload = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (f) => { newItem.value.image = f.target.result; };
            reader.readAsDataURL(file);
        };

        const submitItem = async () => {
            if (!newItem.value.name || !newItem.value.image) return alert('請輸入名稱並拍照');
            uploading.value = true;
            try {
                await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(newItem.value) });
                setTimeout(async () => {
                    await fetchData();
                    showAddModal.value = false;
                    uploading.value = false;
                    newItem.value = { category: '設備', name: '', qty: 1, image: null };
                    alert('新增成功！');
                }, 2000);
            } catch (e) { 
                alert('上傳失敗');
                uploading.value = false;
            }
        };

        const filteredItems = computed(() => {
            return items.value.filter(i => {
                const matchTab = currentTab.value === '全部' || i.category === currentTab.value;
                const matchSearch = String(i.name).includes(searchQuery.value);
                return matchTab && matchSearch;
            }).reverse();
        });

        onMounted(fetchData);
        return { loading, uploading, showAddModal, currentTab, searchQuery, filteredItems, newItem, handleFileUpload, submitItem, fetchData };
    }
}).mount('#app');
</script>
</body>
</html>
